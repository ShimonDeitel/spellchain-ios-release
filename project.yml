name: Spellchain
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Spellchain:
    type: application
    platform: iOS
    sources:
      - path: Spellchain
        excludes:
          - "Resources/**"
      - path: Spellchain/Resources
        buildPhase: resources
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.spellchain
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Spellchain/Info.plist
        CODE_SIGN_ENTITLEMENTS: Spellchain/Spellchain.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SpellchainTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SpellchainTests
      - path: Spellchain.storekit
    dependencies:
      - target: Spellchain
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.spellchain.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Spellchain:
    build:
      targets:
        Spellchain: all
        SpellchainTests: [test]
    run:
      config: Debug
      storeKitConfiguration: Spellchain.storekit
    test:
      config: Debug
      storeKitConfiguration: Spellchain.storekit
      targets:
        - SpellchainTests
    archive:
      config: Release
